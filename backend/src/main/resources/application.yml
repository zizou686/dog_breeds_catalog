spring:
  application:
    name: dog-breeds-api
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dog_breeds}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
